services:
  nextcloud:
    build: ./nextcloud/
    image: nextcloud:local
    container_name: nextcloud
    restart: always
    environment:
      MYSQL_USER: ${NEXTCLOUD_DB_USER} # mysqlユーザ
      MYSQL_PASSWORD: ${NEXTCLOUD_DB_PASSWORD} # mysqlパスワード
      MYSQL_HOST: ${NEXTCLOUD_DB_HOST} # mysqlホスト
      MYSQL_DATABASE: ${NEXTCLOUD_DB_NAME} # mysqlデータベース名
      PHP_MEMORY_LIMIT: ${NEXTCLOUD_PHP_MEMORY_LIMIT} # メモリ上限
      PHP_UPLOAD_LIMIT: ${NEXTCLOUD_PHP_UPLOAD_LIMIT} # アップロード上限
    ports:
      - "${NEXTCLOUD_PORT}:80"
    volumes:
      - nextcloud_data:/var/www/html
  mysql:
    build: ./mysql/
    image: mysql:8.4local
    container_name: mysqldb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD} # rootユーザのパスワード
      MYSQL_DATABASE: ${NEXTCLOUD_DB_NAME} # 作成したいデータベース名
      MYSQL_USER: ${NEXTCLOUD_DB_USER} # 作成したいユーザ名
      MYSQL_PASSWORD: ${NEXTCLOUD_DB_PASSWORD} # 作成したいユーザのパスワード
#    ports:
#      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql         # データ永続化用ボリューム
#    networks:
#      - matsupy-net

volumes:
  mysql_data:
  nextcloud_data:

